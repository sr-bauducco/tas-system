server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      # Add this catch-all route to trigger the MAPE-K loop
      routes:
        - id: goald-manager-route
          uri: http://localhost # This is just a placeholder! Our filter overwrites it.
          predicates:
            - Path=/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true